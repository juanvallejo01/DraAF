name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        
    - name: Install dependencies (Backend)
      working-directory: ./backend
      run: npm install
      
    - name: Build Backend
      working-directory: ./backend
      run: npm run build
      
    - name: Install dependencies (Frontend)
      working-directory: ./frontend
      run: npm install
      
    - name: Build Frontend
      working-directory: ./frontend
      run: npm run build
